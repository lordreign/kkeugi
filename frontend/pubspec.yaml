name: kkeugi
description: "끊기 — 한국 1인 워커 디지털 디톡스 (Focus Accountant)"
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ">=3.5.0 <4.0.0"
  flutter: ">=3.24.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Routing
  go_router: ^14.4.1

  # HTTP / API
  dio: ^5.7.0

  # Local storage
  drift: ^2.20.3
  drift_flutter: ^0.2.4
  path_provider: ^2.1.5
  path: ^1.9.0
  flutter_secure_storage: ^9.2.2

  # Auth
  google_sign_in: ^6.2.2

  # Firebase / FCM (FCM only — no Firestore, no Auth)
  firebase_core: ^3.8.0
  firebase_messaging: ^15.1.5
  firebase_remote_config: ^5.1.5  # 웹툰 패키지 list 동적

  # Notifications (W7 로컬 threshold 알람)
  flutter_local_notifications: ^18.0.1

  # Fonts
  google_fonts: ^6.2.1  # IBM Plex Mono (dynamic) — Pretendard는 assets/fonts/ bundle

  # Sentry
  sentry_flutter: ^9.0.0

  # Utilities
  intl: ^0.20.2  # 날짜·숫자 포맷 (flutter_localizations pin)
  uuid: ^4.5.1  # client_event_id

  # Freezed / JSON (immutable models)
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

  # Platform channel (W4 UsageStatsManager)
  permission_handler: ^11.3.1

  # W4 sync: 8h 주기 백그라운드 + last_sync 커서
  workmanager: ^0.9.0  # 0.5.x는 Flutter 3.44 임베딩과 비호환
  shared_preferences: ^2.3.2

  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^5.0.0

  # Code gen
  build_runner: ^2.4.13
  drift_dev: ^2.20.3
  freezed: ^2.5.7
  json_serializable: ^6.8.0
  riverpod_generator: ^2.4.3

  # Mock / test
  mocktail: ^1.0.4

flutter:
  uses-material-design: true

  # Pretendard pub package 사용 시 assets 불필요
  # IBM Plex Mono는 google_fonts package가 dynamic loading

  assets:
    - assets/images/
    - assets/icons/

  fonts:
    - family: Pretendard
      fonts:
        - asset: assets/fonts/Pretendard-Regular.otf
          weight: 400
        - asset: assets/fonts/Pretendard-Medium.otf
          weight: 500
        - asset: assets/fonts/Pretendard-SemiBold.otf
          weight: 600
        - asset: assets/fonts/Pretendard-Bold.otf
          weight: 700
