services:
  postgres:
    image: postgres:16-alpine
    container_name: kkeugi-pg
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: kkeugi
    ports:
      - "5432:5432"
    volumes:
      - kkeugi-pg-data:/var/lib/postgresql/data
      - ./scripts/init-test-db.sql:/docker-entrypoint-initdb.d/init-test-db.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  kkeugi-pg-data:
