app = "kkeugi-api"
primary_region = "nrt"  # 도쿄 (가장 가까운 region, seoul region 추가 시 'icn' 변경)

[build]

[env]
  PORT = "8080"
  ENVIRONMENT = "production"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

  [[http_service.checks]]
    grace_period = "30s"
    interval = "30s"
    method = "GET"
    timeout = "5s"
    path = "/health"

  [[http_service.checks]]
    grace_period = "60s"
    interval = "60s"
    method = "GET"
    timeout = "10s"
    path = "/ready"

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
