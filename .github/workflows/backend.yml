name: Backend CI/CD

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - ".github/workflows/backend.yml"
  pull_request:
    paths:
      - "backend/**"
      - ".github/workflows/backend.yml"

defaults:
  run:
    working-directory: backend

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: test
          POSTGRES_DB: kkeugi_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql+asyncpg://postgres:test@localhost:5432/kkeugi_test
      JWT_SECRET: test-secret-not-for-prod-only-for-pytest-32b
      GOOGLE_CLIENT_ID: test-client-id.apps.googleusercontent.com
      ENVIRONMENT: test

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install uv
        run: pip install uv
      - name: Install dependencies
        run: uv sync --frozen 2>/dev/null || uv sync
      - name: Lint
        run: uv run ruff check app tests
      - name: Run migrations
        run: uv run alembic upgrade head
      - name: Run tests
        run: uv run pytest --cov=app --cov-report=term-missing

  deploy:
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    env:
      FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - name: Check deploy config
        id: cfg
        working-directory: ${{ github.workspace }}
        run: |
          if [ -n "$FLY_API_TOKEN" ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "::notice::FLY_API_TOKEN 미설정 — 배포 skip. P0 checklist의 Fly.io setup 완료 후 secret 등록 시 자동 활성."
          fi
      - uses: superfly/flyctl-actions/setup-flyctl@master
        if: steps.cfg.outputs.ready == 'true'
      - name: Deploy to Fly.io
        if: steps.cfg.outputs.ready == 'true'
        # workflow default working-directory가 backend라 fly.toml·Dockerfile은 상대 경로
        run: flyctl deploy --remote-only --config fly.toml --dockerfile Dockerfile
